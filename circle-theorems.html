<div class="controls">
    <label for="mode"><strong>Theorem / fact:</strong></label>
    <select id="mode"></select>
    <button id="reset">Reset diagram</button>
  </div>
  
<div id="theoremBanner" class="noteBanner">
    <div class="exploreNote">Drag the points to explore the theorem. What changes? What stays the same?</div>
  </div>

<div class="main">
    <canvas id="canvas" width="520" height="520"></canvas>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const C = {x: 260, y: 250};
const R = 170;
let drag = null;

const colours = {
  blue: '#2b6cb0', orange: '#dd6b20', purple: '#805ad5', green: '#2f855a', red: '#c53030', pink:'#d53f8c', grey:'#4a5568'
};

const modes = [
  {id:'radiiTriangle', name:'A triangle formed by two radii and a chord is isosceles'},
  {id:'radiusTangent', name:'The angle between a tangent and radius is 90°'},
  {id:'equalTangents', name:'Tangents which meet at the same point are equal in length'},
  {id:'centre', name:'The angle at the centre is twice the angle at the circumference'},
  {id:'semicircle', name:'The angle in a semicircle is 90°'},
  {id:'sameSegment', name:'Angles in the same segment are equal'},
  {id:'cyclic', name:'The opposite angles in a cyclic quadrilateral total 180°'},
  {id:'alternateSegment', name:'Alternate Segment Theorem'}
];
const select = document.getElementById('mode');
modes.forEach(m => { const o = document.createElement('option'); o.value=m.id; o.textContent=m.name; select.appendChild(o); });

let pts = {};
function pointOnCircle(deg){ const a = deg*Math.PI/180; return {x:C.x + R*Math.cos(a), y:C.y + R*Math.sin(a), circle:true}; }
function pointOnCircleRad(a){ return {x:C.x+R*Math.cos(a), y:C.y+R*Math.sin(a), circle:true}; }

function reset(){
  const m = select.value;
  pts = {
    A: pointOnCircle(210), B: pointOnCircle(330), P: pointOnCircle(85), Q: pointOnCircle(145),
    T: pointOnCircle(310), X: {x: 475, y: 150, free:true}
  };
  if(m==='radiiTriangle'){ pts.A=pointOnCircle(215); pts.B=pointOnCircle(325); }
  if(m==='semicircle'){ pts.A=pointOnCircle(180); pts.B=pointOnCircle(0); pts.P=pointOnCircle(70); }
  if(m==='sameSegment'){ pts.A=pointOnCircle(215); pts.B=pointOnCircle(325); pts.P=pointOnCircle(75); pts.Q=pointOnCircle(135); }
  if(m==='cyclic'){ pts.A=pointOnCircle(215); pts.B=pointOnCircle(310); pts.P=pointOnCircle(35); pts.Q=pointOnCircle(125); }
  if(m==='radiusTangent'){ pts.T=pointOnCircle(305); }
  if(m==='equalTangents'){ pts.X={x: 475, y: 150, free:true}; }
  if(m==='alternateSegment'){ pts.A=pointOnCircle(210); pts.B=pointOnCircle(325); pts.P=pointOnCircle(80); }
  draw();
}
select.onchange = reset;
document.getElementById('reset').onclick = reset;

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function angleAt(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y}, v2={x:c.x-b.x,y:c.y-b.y};
  const denom = Math.hypot(v1.x,v1.y)*Math.hypot(v2.x,v2.y);
  let ang = Math.acos(Math.max(-1, Math.min(1, (v1.x*v2.x+v1.y*v2.y)/denom)));
  return ang*180/Math.PI;
}
function angleBetweenDirs(d1,d2){
  let diff = Math.abs((d2-d1)*180/Math.PI)%360;
  return diff>180 ? 360-diff : diff;
}
function tangentLineAt(p, len=300){
  const r = {x:p.x-C.x, y:p.y-C.y};
  const u = {x:-r.y/R, y:r.x/R};
  return [{x:p.x-u.x*len, y:p.y-u.y*len}, {x:p.x+u.x*len, y:p.y+u.y*len}];
}
function tangentPointsFromExternalPoint(x){
  const dx=x.x-C.x, dy=x.y-C.y, d=Math.hypot(dx,dy);
  if(d <= R+8) return null;
  const theta=Math.atan2(dy,dx), alpha=Math.acos(R/d);
  return [pointOnCircleRad(theta+alpha), pointOnCircleRad(theta-alpha)];
}

function line(a,b, color='#333', width=2){ ctx.strokeStyle=color; ctx.lineWidth=width; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
function circlePoint(p, label, color='#d33'){
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(p.x,p.y,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.font='bold 17px Arial'; ctx.fillText(label, p.x+10, p.y-10);
}
function label(text, x, y, color='#111', size=18){ ctx.fillStyle=color; ctx.font=`${size}px Arial`; ctx.fillText(text, x, y); }
function drawCircle(){ ctx.strokeStyle='#222'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(C.x,C.y,R,0,Math.PI*2); ctx.stroke(); circlePoint(C,'O',colours.blue); }
function updatePanel(title, measure, hint){
  const titleEl = document.getElementById('title');
  const measureEl = document.getElementById('measure');
  const hintEl = document.getElementById('hint');
  if(titleEl) titleEl.textContent = title;
  if(measureEl) measureEl.innerHTML = measure;
  if(hintEl) hintEl.innerHTML = hint;
}

function normAngle(a){ while(a<0) a += Math.PI*2; while(a>=Math.PI*2) a -= Math.PI*2; return a; }
function signedSmallDelta(a1,a2){
  let d = normAngle(a2) - normAngle(a1);
  if(d > Math.PI) d -= Math.PI*2;
  if(d < -Math.PI) d += Math.PI*2;
  return d;
}
function drawAngle(a,b,c, text, color, radius=38, preferReflex=false){
  const a1 = Math.atan2(a.y-b.y,a.x-b.x);
  const a2 = Math.atan2(c.y-b.y,c.x-b.x);
  let d = signedSmallDelta(a1,a2);
  if(preferReflex){ d = d>0 ? d-2*Math.PI : d+2*Math.PI; }
  ctx.strokeStyle=color; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(b.x,b.y,radius,a1,a1+d,d<0); ctx.stroke();
  const mid = a1 + d/2;
  ctx.fillStyle=color; ctx.font='bold 16px Arial';
  ctx.fillText(text, b.x + Math.cos(mid)*(radius+18)-10, b.y + Math.sin(mid)*(radius+18)+5);
}
function drawRightAngle(a,b,c,color=colours.red,size=24){
  const u = unit({x:a.x-b.x,y:a.y-b.y});
  const v = unit({x:c.x-b.x,y:c.y-b.y});
  const p1={x:b.x+u.x*size,y:b.y+u.y*size};
  const p2={x:p1.x+v.x*size,y:p1.y+v.y*size};
  const p3={x:b.x+v.x*size,y:b.y+v.y*size};
  ctx.strokeStyle=color; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.stroke();
}
function unit(v){ const m=Math.hypot(v.x,v.y); return {x:v.x/m,y:v.y/m}; }
function tickOnSegment(a,b,color='#111',count=1,offset=0){
  const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
  const u=unit({x:b.x-a.x,y:b.y-a.y});
  const n={x:-u.y,y:u.x};
  ctx.strokeStyle=color; ctx.lineWidth=3;
  for(let i=0;i<count;i++){
    const along = (i-(count-1)/2)*9 + offset;
    const m={x:mid.x+u.x*along,y:mid.y+u.y*along};
    ctx.beginPath(); ctx.moveTo(m.x-n.x*9,m.y-n.y*9); ctx.lineTo(m.x+n.x*9,m.y+n.y*9); ctx.stroke();
  }
}
function tangentAngleAt(T, chordEnd){
  const tan = tangentLineAt(T, 100); const v = tan[1];
  let ang = angleAt(v,T,chordEnd);
  if(ang>90) ang = 180-ang;
  return ang;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height); drawCircle();
  const m = select.value;
  if(m==='radiiTriangle'){
    let {A,B}=pts; line(C,A,colours.blue,3); line(C,B,colours.blue,3); line(A,B,colours.orange,3);
    tickOnSegment(C,A,colours.blue,1); tickOnSegment(C,B,colours.blue,1);
    const baseA=angleAt(C,A,B), baseB=angleAt(A,B,C), centre=angleAt(A,C,B);
    drawAngle(C,A,B,`${baseA.toFixed(0)}°`,colours.green,34); drawAngle(A,B,C,`${baseB.toFixed(0)}°`,colours.green,34); drawAngle(A,C,B,`${centre.toFixed(0)}°`,colours.orange,48);
    circlePoint(A,'A'); circlePoint(B,'B');
    updatePanel('A triangle formed by two radii and a chord is isosceles', `<span class="swatch" style="background:${colours.blue}"></span>OA = OB = radii<br><span class="swatch" style="background:${colours.green}"></span>Base angles are equal: <strong>${baseA.toFixed(1)}°</strong> and <strong>${baseB.toFixed(1)}°</strong>`, 'Drag A or B. The two blue sides are always radii, so the triangle OAB is isosceles.');
  }
  if(m==='radiusTangent'){
    let {T}=pts; const [u,v]=tangentLineAt(T); line(u,v,colours.purple,3); line(C,T,colours.blue,3); drawRightAngle(C,T,v,colours.red); circlePoint(T,'T');
    label('90°', T.x+18, T.y+24, colours.red, 17);
    updatePanel('The angle between a tangent and radius is 90°', `<span class="swatch" style="background:${colours.red}"></span>Angle between radius OT and tangent = <strong>90°</strong>`, 'Drag T. The tangent changes direction, but it always meets the radius at a right angle.');
  }
  if(m==='equalTangents'){
    let X=pts.X; const pair=tangentPointsFromExternalPoint(X);
    if(pair){ const [T,U]=pair; line(X,T,colours.purple,3); line(X,U,colours.purple,3); line(C,T,colours.blue); line(C,U,colours.blue); tickOnSegment(X,T,colours.purple,1); tickOnSegment(X,U,colours.purple,1); drawRightAngle(C,T,X,colours.red,20); drawRightAngle(C,U,X,colours.red,20); circlePoint(T,'T'); circlePoint(U,'U'); circlePoint(X,'X','#111');
      updatePanel('Tangents which meet at the same point are equal in length', `<span class="swatch" style="background:${colours.purple}"></span>XT = <strong>${dist(X,T).toFixed(1)}</strong><br><span class="swatch" style="background:${colours.purple}"></span>XU = <strong>${dist(X,U).toFixed(1)}</strong>`, 'Drag X outside the circle. The matching tick marks show the equal tangent lengths.');
    } else { circlePoint(X,'X','#111'); updatePanel('Tangents which meet at the same point are equal in length','Move X outside the circle.','Drag X away from the circle to create two tangents.'); }
  }
  if(m==='centre'){
    let {A,B,P}=pts; line(C,A,colours.blue); line(C,B,colours.blue); line(P,A,colours.orange); line(P,B,colours.orange);
    const cen=angleAt(A,C,B); const circ=angleAt(A,P,B); drawAngle(A,C,B,`${cen.toFixed(0)}°`,colours.orange,50); drawAngle(A,P,B,`${circ.toFixed(0)}°`,colours.green,42);
    circlePoint(A,'A'); circlePoint(B,'B'); circlePoint(P,'P');
    updatePanel('The angle at the centre is twice the angle at the circumference', `<span class="swatch" style="background:${colours.orange}"></span>∠AOB = <strong>${cen.toFixed(1)}°</strong><br><span class="swatch" style="background:${colours.green}"></span>∠APB = <strong>${circ.toFixed(1)}°</strong><br>Centre angle ÷ circumference angle ≈ <strong>${(cen/circ).toFixed(2)}</strong>`, 'Drag A, B or P. The centre angle is double the circumference angle standing on the same arc AB.');
  }
  if(m==='semicircle'){
    let A=pts.A, P=pts.P;
    // The second end of the diameter is calculated from A, so AB always passes through O.
    let D={x:2*C.x-A.x, y:2*C.y-A.y, circle:true};
    pts.B = D;
    line(A,D,colours.blue,3);
    line(P,A,colours.grey,2.5);
    line(P,D,colours.grey,2.5);
    drawRightAngle(A,P,D,colours.red,28);
    label('90°', P.x+18, P.y+20, colours.red, 17);
    circlePoint(A,'A');
    circlePoint(P,'B');
    circlePoint(D,'', '#8a8a8a');
    
    const a=angleAt(A,P,D);
    updatePanel('The angle in a semicircle is 90°', `<span class="swatch" style="background:${colours.red}"></span>Angle at B = <strong>${a.toFixed(1)}°</strong>`, 'Drag A to rotate the diameter. The point opposite A moves automatically so the line always passes through O. Drag B around the circumference and the angle stays 90°.');
  }
  if(m==='sameSegment'){
    let {A,B,P,Q}=pts; line(A,B,colours.orange,3); line(P,A); line(P,B); line(Q,A); line(Q,B);
    const a1=angleAt(A,P,B), a2=angleAt(A,Q,B); drawAngle(A,P,B,`${a1.toFixed(0)}°`,colours.green,36); drawAngle(A,Q,B,`${a2.toFixed(0)}°`,colours.green,36);
    ['A','B','P','Q'].forEach(k=>circlePoint(pts[k],k));
    updatePanel('Angles in the same segment are equal', `<span class="swatch" style="background:${colours.green}"></span>∠APB = <strong>${a1.toFixed(1)}°</strong><br><span class="swatch" style="background:${colours.green}"></span>∠AQB = <strong>${a2.toFixed(1)}°</strong>`, 'Drag P and Q around the same side of chord AB. The matching green angles remain equal.');
  }
  if(m==='cyclic'){
    let {A,B,P,Q}=pts; line(A,B); line(B,P); line(P,Q); line(Q,A);
    const a=angleAt(Q,A,B), p=angleAt(B,P,Q); const b=angleAt(A,B,P), q=angleAt(P,Q,A);
    drawAngle(Q,A,B,`${a.toFixed(0)}°`,colours.green,36); drawAngle(B,P,Q,`${p.toFixed(0)}°`,colours.green,36);
    drawAngle(A,B,P,`${b.toFixed(0)}°`,colours.pink,36); drawAngle(P,Q,A,`${q.toFixed(0)}°`,colours.pink,36);
    ['A','B','P','Q'].forEach(k=>circlePoint(pts[k],k));
    updatePanel('The opposite angles in a cyclic quadrilateral total 180°', `<span class="swatch" style="background:${colours.green}"></span>∠A + ∠P = <strong>${(a+p).toFixed(1)}°</strong><br><span class="swatch" style="background:${colours.pink}"></span>∠B + ∠Q = <strong>${(b+q).toFixed(1)}°</strong>`, 'Drag the vertices. As long as all four points stay on the circle, opposite angles add to 180°.');
  }
  if(m==='alternateSegment'){
    let {A,B,P}=pts; const [u,v]=tangentLineAt(A); line(u,v,colours.purple,3); line(A,B,colours.orange,3); line(P,A); line(P,B);
    const tanAng=tangentAngleAt(A,B), seg=angleAt(A,P,B);
    // choose the tangent ray giving the acute/equal alternate-segment angle
    const ang1=angleAt(v,A,B), endpoint = ang1<=90 ? v : u;
    drawAngle(endpoint,A,B,`${tanAng.toFixed(0)}°`,colours.green,42); drawAngle(A,P,B,`${seg.toFixed(0)}°`,colours.green,42);
    circlePoint(A,'A'); circlePoint(B,'B'); circlePoint(P,'P');
    updatePanel('Alternate Segment Theorem', `<span class="swatch" style="background:${colours.green}"></span>Angle between tangent and chord AB = <strong>${tanAng.toFixed(1)}°</strong><br><span class="swatch" style="background:${colours.green}"></span>Angle in alternate segment ∠APB = <strong>${seg.toFixed(1)}°</strong>`, 'Drag A, B or P. The matching green angles are equal: tangent-chord angle = angle in the alternate segment.');
  }
}

function mousePos(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)*canvas.width/r.width, y:(e.clientY-r.top)*canvas.height/r.height}; }
canvas.addEventListener('mousedown', e => {
  const p=mousePos(e); drag=null;
  if(select.value==='semicircle'){
    const D={x:2*C.x-pts.A.x, y:2*C.y-pts.A.y, circle:true};
    if(dist(p,pts.A)<18) drag='A';
    else if(dist(p,pts.P)<18) drag='P';
    // The opposite end of the diameter is deliberately not draggable.
    return;
  }
  for(const k in pts){ if(dist(p,pts[k])<18) drag=k; }
});
canvas.addEventListener('mousemove', e => {
  if(!drag) return; const p=mousePos(e);
  if(select.value==='semicircle'){
    const a=Math.atan2(p.y-C.y,p.x-C.x);
    if(drag==='A') pts.A=pointOnCircleRad(a);
    if(drag==='P') pts.P=pointOnCircleRad(a);
    pts.B={x:2*C.x-pts.A.x, y:2*C.y-pts.A.y, circle:true};
    draw();
    return;
  }
  if(pts[drag].free){ pts[drag].x=p.x; pts[drag].y=p.y; }
  else { const a=Math.atan2(p.y-C.y,p.x-C.x); pts[drag]=pointOnCircleRad(a); }
  draw();
});
window.addEventListener('mouseup',()=>drag=null);
reset();
</script>
